name: Release

# Push a version tag to cut a release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

# Needed by the publish job to create the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # iced/winit dlopen most X/Wayland libs at runtime, but xkbcommon is the
      # one commonly needed at build time on Linux.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p app-ui --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          name="ferrous-mod-manager-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/ferrous-mod-manager" "$name/"
          cp README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "ferrous-mod-manager-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/ferrous-mod-manager.exe" "$name/"
          Copy-Item README.md, LICENSE "$name/"
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ferrous-mod-manager-*.tar.gz
            ferrous-mod-manager-*.zip
          if-no-files-found: error

  release:
    name: Publish draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          # Leave as a draft so a human reviews + clicks Publish. Flip to
          # `draft: false` to publish automatically on tag push.
          draft: true
          generate_release_notes: true
          files: dist/*
