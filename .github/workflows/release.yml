name: Release

# Push a version tag to cut a release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

# Needed by tauri-action to create the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 needs the WebKitGTK/GLib stack at build time on Linux.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      # Frontend deps for the tauri beforeBuildCommand (`cd ../ui && npm run build`).
      - name: Install frontend dependencies
        run: npm --prefix ui ci

      # `cargo tauri build --no-bundle` needs the Tauri v2 CLI; install it from npm.
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # Builds the app and uploads the platform bundles (.deb/.rpm/.AppImage on
      # Linux, .msi/.exe on Windows) to a single draft GitHub Release. Each
      # matrix job appends its artifacts to the same release keyed by the tag.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ferrous Mod Manager ${{ github.ref_name }}"
          # Leave as a draft so a human reviews + clicks Publish.
          releaseDraft: true
          generateReleaseNotes: true

      # Also attach a standalone, unbundled binary alongside the installers.
      # The release-mode artifacts are already compiled by the step above, so
      # this just relinks/renames the binary to the productName — it's cheap.
      - name: Build no-bundle binary
        run: tauri build --no-bundle

      # Upload the raw executable to the same draft release (Linux/macOS).
      - name: Attach standalone binary (Unix)
        if: matrix.platform != 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp src-tauri/target/release/ferrous-mod-manager \
            ferrous-mod-manager-${{ runner.os }}-x86_64
          gh release upload "${{ github.ref_name }}" \
            ferrous-mod-manager-${{ runner.os }}-x86_64 --clobber

      # Upload the raw executable to the same draft release (Windows).
      - name: Attach standalone binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Copy-Item src-tauri/target/release/ferrous-mod-manager.exe `
            ferrous-mod-manager-Windows-x86_64.exe
          gh release upload "${{ github.ref_name }}" `
            ferrous-mod-manager-Windows-x86_64.exe --clobber
