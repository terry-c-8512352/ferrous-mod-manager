name: Release

# Push a version tag to cut a release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

# Needed by tauri-action to create the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 needs the WebKitGTK/GLib stack at build time on Linux.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      # Frontend deps for the tauri beforeBuildCommand (`cd ../ui && npm run build`).
      - name: Install frontend dependencies
        run: npm --prefix ui ci

      # Builds the app and uploads the platform bundles (.deb/.rpm/.AppImage on
      # Linux, .msi/.exe on Windows) to a single draft GitHub Release. Each
      # matrix job appends its artifacts to the same release keyed by the tag.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ferrous Mod Manager ${{ github.ref_name }}"
          # Leave as a draft so a human reviews + clicks Publish.
          releaseDraft: true
          generateReleaseNotes: true
