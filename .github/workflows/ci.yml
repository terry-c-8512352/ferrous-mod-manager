name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 needs the WebKitGTK/GLib stack at build time. libwebkit2gtk-4.1-dev
      # pulls in gtk3, glib-2.0, gobject-2.0 and soup3.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The `app` crate's tauri build script requires the frontend bundle
      # (ui/dist) to exist before any cargo build/clippy/test.
      - name: Build frontend
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      # Skips #[ignore]d tests (the one that needs a live Steam install).
      - name: Test
        run: cargo test --workspace

  binary:
    name: no-bundle binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 needs the WebKitGTK/GLib stack at build time on Linux.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: binary

      # tauri build runs the beforeBuildCommand (`cd ../ui && npm run build`),
      # but it needs node_modules present first.
      - name: Install frontend dependencies
        run: npm --prefix ui ci

      # `cargo tauri build --no-bundle` needs the Tauri v2 CLI; install it from npm.
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # Builds just the standalone executable, no .deb/.rpm/.AppImage. tauri v2
      # renames the binary to the configured productName (ferrous-mod-manager).
      - name: Build no-bundle binary
        run: cargo tauri build --no-bundle

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ferrous-mod-manager-linux
          # productName-renamed binary, with the cargo bin name as a fallback.
          path: |
            src-tauri/target/release/ferrous-mod-manager
            src-tauri/target/release/app
          if-no-files-found: error
