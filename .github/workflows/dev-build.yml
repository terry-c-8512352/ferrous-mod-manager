name: Dev build (Linux)

# On-demand Linux build for testing on your main PC without cutting a tag.
# Trigger it from the Actions tab -> "Dev build (Linux)" -> "Run workflow".
# A self-contained .AppImage is uploaded as a workflow artifact (no GitHub
# Release). The AppImage bundles WebKitGTK so it runs on any distro.
on:
  workflow_dispatch:

jobs:
  build:
    name: Build standalone binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 needs the WebKitGTK/GLib stack at build time on Linux.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Frontend deps for the tauri beforeBuildCommand (`cd ../ui && npm run build`).
      - name: Install frontend dependencies
        run: npm --prefix ui ci

      # `tauri build` needs the Tauri v2 CLI; install the `tauri` binary from npm.
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # Build only the AppImage bundle. The AppImage embeds WebKitGTK and the
      # other GTK runtime libs, so it runs on any distro (incl. Arch) without
      # installing -dev/runtime packages on the target machine.
      - name: Build AppImage
        run: tauri build --bundles appimage

      # Workspace target dir is at the repo root; the AppImage lands under
      # bundle/appimage/ as <productName>_<version>_amd64.AppImage.
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrous-mod-manager-AppImage
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
